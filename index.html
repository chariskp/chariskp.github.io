<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charis Polycarpou</title>
    
    <!-- Site Icon -->
    <link rel="icon" type="image/x-icon" href="pen.ico">

    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            --accent: #766345;
            --font-serif: Georgia, Cambria, "Times New Roman", Times, serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .wrapper {
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 4.5fr 5.5fr;
            gap: 60px;
            align-items: center;
        }

        /* Image Column */
        .image-side {
            width: 100%;
            aspect-ratio: 3 / 4; /* Professional portrait aspect ratio */
            overflow: hidden;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Content Column */
        .content-side {
            display: flex;
            flex-direction: center;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 2.8rem;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .title-sub {
            font-family: var(--font-sans);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 24px;
            font-weight: 500;
        }

        .bio {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 32px;
            max-width: 440px;
        }

        /* Simplified, Elegant Link List */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-main);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            width: fit-content;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .nav-link:hover {
            color: var(--accent);
            transform: translateX(4px);
        }

        .nav-link::after {
            content: " ↗";
            font-size: 0.85rem;
            margin-left: 4px;
            opacity: 0.7;
        }

        /* Responsive design for smaller devices */
        @media (max-width: 768px) {
            .wrapper {
                grid-template-columns: 1fr;
                gap: 32px;
            }

            .image-side {
                max-width: 400px;
                margin: 0 auto;
            }

            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <main class="wrapper">
        <!-- Visual Column -->
        <section class="image-side">
            <img src="me_1.jpeg" alt="Charis Polycarpou" class="profile-img">
        </section>

        <!-- Information Column -->
        <section class="content-side">
            <h1>Charis Polycarpou</h1>
            <p class="title-sub">Creative Writer & Artist</p>
            
            <p class="bio">
                Exploring narrative architecture and movement. Dedicated to crafting compelling stories and examining the intersections of language, structure, and performance.
            </p>
            
            <!-- Links Area -->
            <nav class="links-container">
                <a href="https://www.linkedin.com/in/charis-polycarpou-4b0b0829a/" class="nav-link" target="_blank" rel="noopener noreferrer">
                    Professional Network (LinkedIn)
                </a>
                <a href="https://www.rivertowndanceacademy.org/facultyandstaff.html#/" class="nav-link" target="_blank" rel="noopener noreferrer">
                    Rivertown Dance Academy
                </a>
            </nav>
        </section>
    </main>

</body>
</html>
